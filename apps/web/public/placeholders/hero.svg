<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="900" fill="#C6BCB3"/>
  <rect x="0" y="0" width="1200" height="900" fill="url(#grad)" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECE5E0"/>
      <stop offset="100%" stop-color="#C6BCB3"/>
    </linearGradient>
  </defs>
  <!-- Decorative diamond motif -->
  <g transform="translate(600,400)" opacity="0.18">
    <rect x="-60" y="-60" width="120" height="120" rx="4" fill="none" stroke="#3C3C3B" stroke-width="1.5" transform="rotate(45)"/>
    <rect x="-35" y="-35" width="70" height="70" rx="3" fill="none" stroke="#3C3C3B" stroke-width="1" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="6" fill="#3C3C3B"/>
    <!-- Sparkle rays -->
    <line x1="0" y1="-18" x2="0" y2="-30" stroke="#3C3C3B" stroke-width="1.2"/>
    <line x1="0" y1="18" x2="0" y2="30" stroke="#3C3C3B" stroke-width="1.2"/>
    <line x1="-18" y1="0" x2="-30" y2="0" stroke="#3C3C3B" stroke-width="1.2"/>
    <line x1="18" y1="0" x2="30" y2="0" stroke="#3C3C3B" stroke-width="1.2"/>
  </g>
  <text x="600" y="520" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" fill="#3C3C3B" opacity="0.35" letter-spacing="0.15em">MARR LASER &amp; SKIN CLINIC</text>
</svg>
