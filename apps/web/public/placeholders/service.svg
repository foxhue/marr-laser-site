<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="400" fill="#ECE5E0"/>
  <!-- Decorative diamond -->
  <g transform="translate(300,180)" opacity="0.2">
    <rect x="-40" y="-40" width="80" height="80" rx="3" fill="none" stroke="#3C3C3B" stroke-width="1.2" transform="rotate(45)"/>
    <rect x="-22" y="-22" width="44" height="44" rx="2" fill="none" stroke="#3C3C3B" stroke-width="0.8" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="4" fill="#3C3C3B"/>
    <line x1="0" y1="-12" x2="0" y2="-20" stroke="#3C3C3B" stroke-width="1"/>
    <line x1="0" y1="12" x2="0" y2="20" stroke="#3C3C3B" stroke-width="1"/>
    <line x1="-12" y1="0" x2="-20" y2="0" stroke="#3C3C3B" stroke-width="1"/>
    <line x1="12" y1="0" x2="20" y2="0" stroke="#3C3C3B" stroke-width="1"/>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" fill="#3C3C3B" opacity="0.3" letter-spacing="0.12em">TREATMENT</text>
</svg>
